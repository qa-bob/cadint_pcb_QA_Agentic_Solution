name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Playwright (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [smoke, navigation, forms, functional, regression, responsive]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: TypeScript check
        run: npm run typecheck

      - name: Run ${{ matrix.suite }} tests
        run: npm run test:${{ matrix.suite }}
        env:
          CI: 1
          SITE_URL: ${{ vars.SITE_URL || 'http://www.cadint.com' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.suite }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual tests
        run: npm run test:visual
        env:
          CI: 1
          SITE_URL: ${{ vars.SITE_URL || 'http://www.cadint.com' }}

      - name: Upload snapshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-screenshots
          path: test-results/
          retention-days: 14
